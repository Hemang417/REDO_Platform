# ---------------------------------------------------------------------------
# REDO Platform — AI Analyst Configuration
#
# Claude: set ANTHROPIC_API_KEY environment variable
# Groq:   set GROQ_API_KEY environment variable
# Switch providers with: python scripts/run_analyst.py --provider groq
# ---------------------------------------------------------------------------

ai:
  model: "claude-sonnet-4-6"
  max_tokens: 1024
  request_timeout: 60
  max_retries: 3
  retry_backoff_factor: 2.0

  # Only generate memos for projects above this threshold (saves API cost)
  min_score_for_memo: 0.0   # set to 0 to memo all; raise for production runs

  # Hard cap per run (guards against unexpected large inputs)
  max_memos_per_run: 500

  # File-based cache: skip projects already memoised in this output directory
  cache_dir: "output/memos/cache"
  output_dir: "output/memos"

  # Groq settings (used when --provider groq is passed)
  # Free tier supports llama-3.3-70b-versatile at ~6000 tokens/min
  groq_model: "llama-3.3-70b-versatile"
  groq_max_tokens: 2048

  system_prompt: |
    You are a senior investment analyst at a Category II Alternative Investment Fund
    specialising in Maharashtra real estate. Your mandate is to evaluate
    MAHARERA-registered projects as candidates for AIF debt or equity investment.

    CRITICAL CONSTRAINTS — read carefully before responding:
    1. Reason ONLY from the structured data provided in each project brief.
       Do not invent facts, assume market conditions, or cite external information.
    2. If a field is listed as null or missing, treat it as a data gap —
       acknowledge it rather than assuming a value.
    3. Your opportunity thesis must cite specific metrics from the brief.
    4. Every risk flag must be grounded in a specific data point.
    5. Recommended action must follow directly from the data:
       - FLAG_FOR_REVIEW: strong metrics, warrants immediate analyst attention.
       - MONITOR: interesting but missing data or borderline metrics.
       - PASS: low opportunity score, lapsed/deregistered, or no funding gap.
    6. Write the opportunity thesis in 2–3 sentences maximum.
       Write each risk flag as a single crisp sentence citing the data.
